<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 华峰石化数字孪生平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-visual {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 55%;
            background: linear-gradient(135deg, rgba(0, 40, 80, 0.9), rgba(0, 20, 40, 0.95));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            overflow: hidden;
        }

        .login-visual::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 136, 0.1) 0%, transparent 40%);
            animation: visualPulse 10s ease-in-out infinite;
        }

        @keyframes visualPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .login-visual-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-visual-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 255, 136, 0.2));
            border: 2px solid rgba(0, 212, 255, 0.5);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-visual-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .login-visual-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 400px;
            line-height: 1.6;
        }

        .login-visual-features {
            display: flex;
            gap: 40px;
            margin-top: 60px;
        }

        .login-feature {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
        }

        .login-feature-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 12px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }

        .login-feature-text {
            font-size: 0.875rem;
        }

        .login-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .login-form-section {
            width: 45%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .login-back:hover {
            color: var(--primary-color);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 0.9375rem;
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-input {
            position: relative;
        }

        .login-input .input {
            height: 52px;
            padding-left: 48px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            font-size: 0.9375rem;
        }

        .login-input .input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
        }

        .login-input svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            transition: color 0.3s;
        }

        .login-input:focus-within svg {
            color: var(--primary-color);
        }

        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .login-remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .login-remember input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        .login-forgot {
            color: var(--primary-color);
            transition: color 0.3s;
        }

        .login-forgot:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        .login-btn {
            height: 52px;
            font-size: 1rem;
            margin-top: 8px;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .login-divider span {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .login-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary-color);
        }

        .login-error {
            display: none;
            padding: 12px 16px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: var(--radius-md);
            color: var(--danger-color);
            font-size: 0.875rem;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-error.show {
            display: flex;
        }

        .login-captcha {
            display: flex;
            gap: 12px;
        }

        .login-captcha .input {
            flex: 1;
        }

        .login-captcha-img {
            width: 120px;
            height: 52px;
            background: var(--bg-darker);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            letter-spacing: 4px;
            user-select: none;
        }

        @media (max-width: 1024px) {
            .login-visual {
                display: none;
            }
            .login-form-section {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .login-form-section {
                padding: 20px;
            }
            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-form-section">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-back">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        返回首页
                    </div>
                    <h1 class="login-title">欢迎登录</h1>
                    <p class="login-subtitle">华峰石化数字孪生平台</p>
                </div>

                <div class="login-error" id="loginError">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>用户名或密码错误，请重新输入</span>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="login-input">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" class="input" id="username" placeholder="请输入用户名" required autocomplete="username">
                    </div>

                    <div class="login-input">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" class="input" id="password" placeholder="请输入密码" required autocomplete="current-password">
                    </div>

                    <div class="login-captcha">
                        <div class="login-input" style="flex: 1;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 12l2 2 4-4"/>
                                <rect x="3" y="4" width="18" height="16" rx="2"/>
                            </svg>
                            <input type="text" class="input" id="captcha" placeholder="请输入验证码" required autocomplete="off">
                        </div>
                        <div class="login-captcha-img" id="captchaImg" title="点击刷新">A3K7</div>
                    </div>

                    <div class="login-options">
                        <label class="login-remember">
                            <input type="checkbox" id="remember">
                            <span>记住登录状态</span>
                        </label>
                        <a href="#" class="login-forgot">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn btn-primary login-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        登 录
                    </button>
                </form>

                <div class="login-divider">
                    <span>其他登录方式</span>
                </div>

                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button class="btn" style="flex: 1;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="M7 15h0M2 9.5h20"/>
                        </svg>
                        企业SSO
                    </button>
                    <button class="btn" style="flex: 1;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/>
                        </svg>
                        指纹登录
                    </button>
                </div>

                <div class="login-footer">
                    <p>© 2026 华峰石化数字孪生平台 · 保留所有权利</p>
                    <p style="margin-top: 8px;">
                        <a href="#">使用条款</a> · <a href="#">隐私政策</a> · <a href="#">帮助中心</a>
                    </p>
                </div>
            </div>
        </div>

        <div class="login-visual">
            <div class="login-visual-content">
                <div class="login-visual-logo">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2 class="login-visual-title">数字孪生 智慧工厂</h2>
                <p class="login-visual-desc">融合3D可视化、物联网传感与实时监控，打造智能化石化生产管理新体验</p>
                
                <div class="login-visual-features">
                    <div class="login-feature">
                        <div class="login-feature-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                                <line x1="12" y1="22.08" x2="12" y2="12"/>
                            </svg>
                        </div>
                        <div class="login-feature-text">3D数字孪生</div>
                    </div>
                    <div class="login-feature">
                        <div class="login-feature-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                            </svg>
                        </div>
                        <div class="login-feature-text">实时监控</div>
                    </div>
                    <div class="login-feature">
                        <div class="login-feature-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="23 7 16 12 23 17 23 7"/>
                                <rect x="1" y="5" width="15" height="14" rx="2"/>
                            </svg>
                        </div>
                        <div class="login-feature-text">视频融合</div>
                    </div>
                    <div class="login-feature">
                        <div class="login-feature-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                        </div>
                        <div class="login-feature-text">数据分析</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // 验证码刷新
        const captchaImg = document.getElementById('captchaImg');
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        
        function generateCaptcha() {
            let result = '';
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            captchaImg.textContent = result;
        }
        
        captchaImg.addEventListener('click', generateCaptcha);
        
        // 登录表单提交
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;
            const remember = document.getElementById('remember').checked;
            
            // 简单验证
            if (!username || !password || !captcha) {
                showError('请填写完整信息');
                return;
            }
            
            if (captcha.toUpperCase() !== captchaImg.textContent) {
                showError('验证码错误，请重新输入');
                generateCaptcha();
                document.getElementById('captcha').value = '';
                return;
            }
            
            // 模拟登录成功
            // 实际项目中这里应该调用API
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('user', JSON.stringify({
                name: username,
                role: '管理员',
                avatar: username.charAt(0).toUpperCase()
            }));
            
            // 跳转
window.location.href = 'index.html';
        });
        
        function showError(message) {
            loginError.querySelector('span').textContent = message;
            loginError.classList.add('show');
            setTimeout(() => {
                loginError.classList.remove('show');
            }, 3000);
        }
        
        // 检查是否已登录
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
